databases:
  - name: pulseboard-db
    plan: free
    databaseName: pulseboard
    user: pulseboard

services:
  - type: web
    name: pulseboard-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: cron
    name: pulseboard-ingestion
    runtime: docker
    plan: starter
    rootDir: ingestion
    dockerfilePath: ./Dockerfile
    schedule: "*/10 * * * *"
    dockerCommand: python -u main.py --once
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
